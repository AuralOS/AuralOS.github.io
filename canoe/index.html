<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canoe Web</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1f2937, #020617 70%);
  color: white;
  overflow-x: hidden;
  overflow-y: scroll;
  height: 100vh;
  position: relative;
}

/* Topbar */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  z-index: 100;
}

/* Logo */
.logo {
  font-size: 22px;
  font-weight: 600;
}

/* Top buttons */
.top-buttons {
  display: flex;
  gap: 10px;
}

.top-buttons .btn {
  padding: 6px 12px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 14px;
}

.top-buttons .btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.05);
}

/* Content */
.content {
  margin-top: 70px;
  padding: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

/* Bottom search container */
.search-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 100;
}

/* Search input */
.search {
  width: 260px;
  height: 50px;
  padding: 12px 16px;
  border-radius: 25px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  font-size: 16px;
  backdrop-filter: blur(15px) saturate(180%);
  -webkit-backdrop-filter: blur(15px) saturate(180%);
  background: rgba(255,255,255,0.06);
  color: white;
  transition: all 0.25s ease;
}

.search:focus {
  box-shadow: 0 0 25px rgba(120,120,255,0.4);
}

/* Home button next to search */
.home-btn {
  padding: 0 14px;
  border-radius: 22px;
  border: none;
  height: 50px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.home-btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.05);
}

/* Floating effect on scroll */
body.scrolling .search-container {
  transform: translateX(-50%) translateY(-2px);
  filter: blur(0.8px);
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">Canoe Web</div>
</div>

<!-- Main content -->
<div class="content">
  <p>Witamy w Canoe Web! Wpisz cokolwiek w dolnej wyszukiwarce, aby wyszukać w Google.</p>
</div>

<!-- Bottom search + home -->
<div class="search-container">
  <input class="search" id="searchInput" placeholder="Szukaj w Google..." onkeydown="handleSearch(event)">
  <button class="home-btn" onclick="goHome()">Home</button>
</div>

<script>
// Floating scroll effect
let ticking = false;
window.addEventListener('scroll', () => {
  if(!ticking){
    document.body.classList.add('scrolling');
    clearTimeout(window.scrollTimeout);
    window.scrollTimeout = setTimeout(() => {
      document.body.classList.remove('scrolling');
    }, 100);
    ticking = false;
  }
  ticking = true;
});

// Search handler
function handleSearch(e) {
  if(e.key === "Enter") {
    const query = document.getElementById("searchInput").value.trim();
    if(query) {
      window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
    }
  }
}

// Home button
function goHome() {
  window.location.href = "https://auralos.github.io";
}
</script>

</body>
</html>
