      <!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuralOS</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1f2937, #020617 70%);
  color: white;
  overflow-x: hidden;
  overflow-y: scroll;
  height: 100vh;
  position: relative;
}

/* Topbar */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  z-index: 100;
}

/* Logo */
.logo {
  font-size: 22px;
  font-weight: 600;
}

/* Top buttons */
.top-buttons {
  display: flex;
  gap: 8px; /* mniejsze odstępy, żeby wszystko się zmieściło */
}

.top-buttons .btn {
  padding: 4px 10px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 13px; /* mniejsze, żeby wszystko zmieściło się w jednej linii */
}

.top-buttons .btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.05);
}

/* Main content */
.content {
  margin-top: 70px;
  padding: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

/* Floating search bar at bottom like iOS 26 */
.search-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.search {
  width: 100%;
  height: 100%;
  padding: 12px 16px;
  border-radius: 25px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  font-size: 16px;
  backdrop-filter: blur(15px) saturate(180%);
  -webkit-backdrop-filter: blur(15px) saturate(180%);
  background: rgba(255,255,255,0.06);
  color: white;
  transition: all 0.25s ease;
}

.search:focus {
  box-shadow: 0 0 25px rgba(120,120,255,0.4);
}

/* iOS 26 floating effect */
body.scrolling .search {
  transform: translateX(-50%) translateY(-2px);
  filter: blur(0.8px);
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">AuralOS</div>
  <div class="top-buttons">
    <button class="btn" onclick="window.location.href='https://auralos.github.io/canoe'">Canoe Web</button>
    <button class="btn" onclick="window.location.href='https://auralos.github.io/we'">O Nas</button>
    <button class="btn" onclick="window.location.href='https://t.me/Auralinfo'">Telegram</button>
  </div>
</div>

<!-- Main content placeholder -->
<div class="content">
  <p>Witamy w AuralOS — najlepszym systemie operacyjnym dla każdego użytkownika!</p>
  <p>Możesz przewijać stronę, a wyszukiwarka na dole zawsze będzie widoczna.</p>
</div>

<!-- Bottom floating search bar -->
<div class="search-container">
  <input class="search" id="searchInput" placeholder="Szukaj..." onkeydown="handleSearch(event)">
</div>

<script>
// Scroll effect for search bar floating
let ticking = false;
window.addEventListener('scroll', () => {
  if(!ticking){
    document.body.classList.add('scrolling');
    clearTimeout(window.scrollTimeout);
    window.scrollTimeout = setTimeout(() => {
      document.body.classList.remove('scrolling');
    }, 100);
    ticking = false;
  }
  ticking = true;
});

// Handle search logic
function handleSearch(e) {
  if(e.key === "Enter") {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    if(!query) return;

    const redirects = {
      'youtube': 'https://www.youtube.com',
      'chatgpt': 'https://chat.openai.com',
      'telegram': 'https://telegram.org',
      'spotify': 'https://www.spotify.com',
      'facebook': 'https://www.facebook.com',
      'google': 'https://www.google.com',
      'canoe': 'https://auralos.github.io/canoe'
    };

    if(redirects[query]) {
      window.location.href = redirects[query];
    } else {
      window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
    }
  }
}
</script>

</body>
</html>
