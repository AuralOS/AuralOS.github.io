      <!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuralOS</title>
<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1f2937, #020617 70%);
  overflow: hidden;
  color: white;
}

/* iOS 26 Glass Topbar */
.topbar {
  position: fixed;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 22px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(35px) saturate(180%);
  -webkit-backdrop-filter: blur(35px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.05);
}

/* Button */
.btn {
  padding: 9px 14px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.06);
}

/* Search */
.search {
  width: 260px;
  padding: 10px 14px;
  border-radius: 16px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
  transition: all 0.25s ease;
}

/* Focus iOS glow */
.search:focus {
  background: rgba(255,255,255,0.15);
  box-shadow: 0 0 25px rgba(120,120,255,0.3);
  transform: scale(1.02);
}

/* Typing glow */
.search.typing {
  box-shadow: 0 0 20px rgba(120,120,255,0.6);
}

/* Center text */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  font-weight: 600;
  opacity: 0.85;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn" onclick="goCanoe()">Canoe Web</button>
  <input class="search" id="searchInput" placeholder="Szukaj..." 
    onkeydown="handleSearch(event)" 
    oninput="typingEffect()">
</div>

<div class="center">AuralOS</div>

<script>
function goCanoe() {
  window.location.href = "https://auralos.github.io/canoe";
}

function handleSearch(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("searchInput").value.toLowerCase().trim();
    switch(input) {
      case "youtube": window.location.href = "https://youtube.com"; break;
      case "chatgpt": window.location.href = "https://chatgpt.com"; break;
      case "telegram": window.location.href = "https://telegram.org"; break;
      case "spotify": window.location.href = "https://spotify.com"; break;
      case "facebook": window.location.href = "https://facebook.com"; break;
      case "google": window.location.href = "https://google.com"; break;
      case "canoe": window.location.href = "https://auralos.github.io/canoe"; break;
      default: window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(input); break;
    }
  }
}

/* Typing animation */
function typingEffect() {
  const input = document.getElementById("searchInput");
  input.classList.add("typing");
  clearTimeout(input.timer);
  input.timer = setTimeout(() => input.classList.remove("typing"), 400);
}
</script>

</body>
</html>
