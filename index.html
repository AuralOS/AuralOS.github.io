      <!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuralOS iOS 26 Vibe</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      height: 100vh;
      overflow: hidden; /* brak scrolla */
      backdrop-filter: blur(0px);
    }

    header {
      width: 100%;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 3em;
      margin-bottom: 10px;
      color: #0ff;
    }

    header p {
      font-size: 1.2em;
      color: #ccc;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px) saturate(180%);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      color: #0ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1em;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: rgba(0,255,255,0.2);
      transform: scale(1.05);
      box-shadow: 0 15px 25px rgba(0,255,255,0.3);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-radius: 25px;
      padding: 50px;
      text-align: center;
      width: 80%;
      max-width: 600px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card h2 {
      color: #0ff;
      font-size: 2em;
      margin-bottom: 15px;
    }

    .card p {
      color: #ddd;
      font-size: 1.1em;
      line-height: 1.5;
    }

    footer {
      width: 100%;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(15px);
    }

    input[type="text"] {
      padding: 15px 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px) saturate(180%);
      color: #fff;
      font-size: 1em;
      width: 300px;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: #0ff;
      box-shadow: 0 10px 20px rgba(0,255,255,0.3);
    }

    button {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>AuralOS</h1>
    <p>iOS 26 Vibe UI — płynny, futurystyczny, bez scrolla</p>
    <div class="buttons">
      <a href="https://AuralOS.github.io/we" class="btn">My, O nas</a>
      <a href="https://t.me/Auralinfo" class="btn">Nasz Telegram</a>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>Witaj w AuralOS</h2>
      <p>Płynne interfejsy, efekty liquid glass, futurystyczny wygląd w stylu iOS 26.</p>
    </div>
  </main>

  <footer>
    <form id="searchForm" onsubmit="return handleSearch(event)">
      <input type="text" id="searchInput" placeholder="Wpisz coś... np. YouTube">
      <button type="submit">Szukaj</button>
    </form>
  </footer>

  <script>
    function handleSearch(e) {
      e.preventDefault();
      const val = document.getElementById('searchInput').value.toLowerCase().trim();
      if (val.includes('youtube')) {
        window.location.href = 'https://youtube.com';
      } else {
        alert('Nie znaleziono wyniku. Wpisz np. "YouTube".');
      }
    }

    // Efekt hover na karty (lekkie ruchy jak iOS 26)
    const card = document.querySelector('.card');
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth - 0.5) * 10;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
    });
  </script>

</body>
</html>
